<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Session Master</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#07070d;
    --card:rgba(255,255,255,.05);
    --purple:#8b5cf6;
    --purple-light:#a855f7;
    --white:#ffffff;
    --border:rgba(255,255,255,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    /* 💣 убираем ВСЕ мобильные/браузерные подсветки */
    -webkit-tap-highlight-color: transparent;
}

body{
    background:var(--bg);
    color:white;
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    min-height:100vh;
}

/* 💣 УБРАТЬ ФОКУС У ВСЕХ КНОПОК */
button,
button:focus,
button:active,
button:focus-visible{
    outline:none !important;
    box-shadow:none !important;
}

/* Космический фон */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    background:
        radial-gradient(circle at 20% 30%,rgba(139,92,246,.25),transparent 25%),
        radial-gradient(circle at 80% 70%,rgba(168,85,247,.2),transparent 30%),
        radial-gradient(circle at 50% 50%,rgba(255,255,255,.03),transparent 40%);
}

.stars::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image:radial-gradient(white 1px,transparent 1px);
    background-size:50px 50px;
    opacity:.15;
    animation:moveStars 120s linear infinite;
}

@keyframes moveStars{
    from{ transform:translate(0,0); }
    to{ transform:translate(-500px,-500px); }
}

.hero{
    padding:80px 20px 40px;
    text-align:center;
}

.logo{
    font-family:'Orbitron',sans-serif;
    font-size:4rem;
    font-weight:700;
    letter-spacing:4px;
    color:white;
    text-shadow:
        0 0 10px #8b5cf6,
        0 0 20px #8b5cf6,
        0 0 40px #8b5cf6;
}

.subtitle{
    margin-top:15px;
    color:#cfcfcf;
    font-size:1.1rem;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    backdrop-filter:blur(20px);
    border-radius:24px;
    padding:25px;
    transition:.35s;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:linear-gradient(
        130deg,
        rgba(139,92,246,.12),
        transparent,
        rgba(168,85,247,.1)
    );
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:
        0 0 20px rgba(139,92,246,.3),
        0 0 50px rgba(139,92,246,.15);
}

.test-icon{
    font-size:2rem;
    margin-bottom:15px;
}

.card h2{
    margin-bottom:15px;
    font-size:1.4rem;
}

.stat{
    margin:10px 0;
    color:#d7d7d7;
}

.btn{
    width:100%;
    margin-top:20px;
    border:none;
    border-radius:14px;
    padding:14px;
    cursor:pointer;
    font-size:1rem;
    font-weight:600;
    color:white;
    background:linear-gradient(135deg,#8b5cf6,#a855f7);
    transition:.3s;
}

.btn:hover{
    transform:scale(1.03);
    box-shadow:
        0 0 15px #8453f773,
        0 0 35px #6330da8f;
}

.footer{
    text-align:center;
    padding:60px 20px;
    color:#8f8f8f;
}

.glow{
    position:fixed;
    width:400px;
    height:400px;
    border-radius:50%;
    background:#450dc985;
    filter:blur(180px);
    opacity:.15;
    top:-150px;
    right:-150px;
    z-index:-1;
}

@media(max-width:768px){
    .logo{ font-size:2.5rem; }
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="glow"></div>

<section class="hero">

    <h1 class="logo">
        Сессия для дебилав
    </h1>

    <p class="subtitle">
        Подготовка к сессии 🚀🤙🤙
    </p>

</section>

<div class="container">

    <div class="grid">

        <!-- РУССКИЙ -->
        <div class="card">

            <div class="test-icon">📚</div>

            <h2>Русский язык</h2>

            <div class="stat">
                Лучший результат:
                <span id="bestResultRussian">0</span>/80
            </div>

            <div class="stat">
                Попыток:
                <span id="attemptsRussian">0</span>
            </div>

            <div class="stat">
                Успешность:
                <span id="percentRussian">0%</span>
            </div>

            <button id="russianBtn" class="btn">
                Начать тест
            </button>

        </div>

        <!-- ФИЗИКА (ИСПРАВЛЕНО) -->
        <div class="card">

            <div class="test-icon">⚡</div>

            <h2>Физика</h2>

            <div class="stat">
                Лучший результат:
                <span id="bestResultPhysics">0</span>/80
            </div>

            <div class="stat">
                Попыток:
                <span id="attemptsPhysics">0</span>
            </div>

            <div class="stat">
                Успешность:
                <span id="percentPhysics">0%</span>
            </div>

            <button id="physicsBtn" class="btn">
                Начать физику
            </button>

        </div>

    </div>
</div>

<footer class="footer">
    работай родненький чат джпт © 2026
</footer>

<script src="app.js"></script>

</body>
</html>
